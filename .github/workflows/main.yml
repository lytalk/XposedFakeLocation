# Android CI — build, unit tests, lint (AGP 8.7 / compileSdk 34)
# 仅打 debug APK（无自定义签名）。推送 v* tag 时将该 APK 发布到 GitHub Release。
name: Android CI

on:
  push:
    branches: [ opt_location ]
    tags: ["v*"]
  pull_request:
    branches: [opt_location ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Run Android lint (debug)
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-debug
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: release

      - name: Rename APK for release
        run: mv release/*.apk "release/XposedFakeLocation-${{ github.ref_name }}.apk"

      - name: Create Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          files: release/XposedFakeLocation-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
